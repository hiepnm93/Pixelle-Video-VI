<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1024">
    <meta name="viewport" content="width=1080, height=1920">
    <title>Phong cách thẻ tâm lý - 1080x1920</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { width: 1080px; height: 1920px; overflow: hidden; }

        body {
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            color: #fff;
            position: relative; /* Làm ngữ cảnh định vị toàn trang */
        }

        /* Vùng tiêu đề nền đen trên cùng */
        .top {
            height: 20%;
            background: #0a0a0a;
            padding: 100px 70px 40px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            text-align: center;
        }

        .title {
            max-width: 920px;
            font-size: 96px;
            font-weight: 900;
            line-height: 1.2;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 6px 22px rgba(0,0,0,0.5);
        }

        /* Khung giữa giữ trống, chỉ dùng để phân chia */
        .middle { height: 70%; }

        /* Căn tâm hình ảnh vào giữa trang (độc lập với tiêu đề) */
        .media {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 86%;
            max-height: 58%;
            background: transparent;
            border: none;
            box-shadow: none;
        }
        .media img { width: 100%; height: 100%; object-fit: contain; display: block; }

        /* Phụ đề di chuyển lên vùng khung đỏ phía trên (khoảng phía trên phần dưới trang) */
        .caption {
            position: absolute;
            left: 50%;
            bottom: 320px; /* Di chuyển lên vị trí trên */
            transform: translateX(-50%);
            width: 86%; /* Căn theo chiều rộng hình ảnh */
            max-width: 930px;
            text-align: center;
            font-size: 54px;
            font-weight: 900;
            line-height: 1.2;
            color: #fefefe;
            text-shadow: 0 0 0 #000,
                         -3px -3px 0 #000,
                          3px -3px 0 #000,
                         -3px  3px 0 #000,
                          3px  3px 0 #000;
        }

        @media (max-width: 1080px) { .title { font-size: 84px; } .caption { font-size: 48px; bottom: 600px; } }
    </style>
</head>
<body>
    <div class="top">
        <div class="title">{{title}}</div>
    </div>

    <div class="middle"></div>

    <div class="media"><img src="{{image}}" alt="Hình ảnh nội dung"></div>
    <div class="caption">{{text}}</div>
</body>
</html>
